server:
  port: 8081

spring:
  application:
    name: psicologico-api
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: gemini-2.5-flash
  
  datasource:
    url: jdbc:postgresql://localhost:5437/gabinete_psicologico
    username: postgres
    password: 1234567
    driver-class-name: org.postgresql.Driver
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  security:
    user:
      name: admin
      password: admin123
logging:
  level:
    org.flywaydb: DEBUG